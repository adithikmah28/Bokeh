<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Judulnya akan diisi oleh JavaScript -->
    <title>Sedang Memuat... - BokehFlix</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="container">
            <a href="index.html" class="logo">BokehFlix</a>
            <ul class="nav-links">
                <li><a href="index.html">Terbaru</a></li>
                <li><a href="#">Populer</a></li>
                <li><a href="#">Kategori</a></li>
            </ul>
            <div class="nav-actions"><i class="fas fa-search"></i></div>
        </nav>
    </header>

    <main class="container">
        <div class="watch-container">
            <!-- KOLOM KIRI (UTAMA) - KOSONG -->
            <div class="main-content">
                <h1 class="watch-title" id="video-title"></h1>
                <div class="video-player-container" id="video-player"></div>
                <div class="video-actions">
                    <button class="btn-action"><i class="fas fa-heart"></i> Suka</button>
                    <button class="btn-action"><i class="fas fa-share-alt"></i> Bagikan</button>
                    <button class="btn-action"><i class="fas fa-flag"></i> Laporkan</button>
                </div>
                <div class="video-details">
                    <h3>Deskripsi</h3>
                    <p id="video-description"></p>
                    <div class="video-tags" id="video-tags"></div>
                </div>
            </div>

            <!-- KOLOM KANAN (SIDEBAR) - KOSONG -->
            <aside class="sidebar">
                <h3 class="sidebar-title">Video Lainnya</h3>
                <div class="sidebar-video-list" id="sidebar-list"></div>
            </aside>
        </div>
    </main>

    <footer>
        <div class="container"><p>© 2024 BokehFlix. All rights reserved.</p></div>
    </footer>

    <!-- Sambungkan ke SCRIPT KHUSUS HALAMAN NONTON -->
    <script src="nonton-script.js"></script>
</body>
</html>
